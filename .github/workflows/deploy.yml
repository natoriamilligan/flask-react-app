name: Deploy App to AWS ECS

on:
  push:
    paths:
      - "backend/"
  workflow_dispatch:

permissions:
  id-token: write

jobs:  
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_db
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pylint pytest
        
      - name: Run tests
        run: pytest tests

      - name: Run pylint
        run: pylint /backend
        
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::000363030077:role/deploy-github-role
          aws-region: us-east-1

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        run: |
          docker build -f backend/Dockerfile -t ${{ env.ECR_REPO }}:latest backend/
          docker push ${{ env.ECR_REPO }}:latest

      - name: Fetch ECS Task Definition
        run: |
          aws ecs describe-task-definition --task-definition banksie-task --query taskDefinition > task-definition.json

      - name: Update task definition
        id: updated-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: banksie-container
          image: ${{ secrets.ECR_REPO }}:latest

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.updated-task.outputs.task-definition }}
          cluster: ${{ vars.ECS_CLUSTER }}
          service: ${{ vars.ECS_SERVICE }}
          wait-for-service-stability: true
