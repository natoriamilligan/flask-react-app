name: Upload Frontend Files to S3

on:
  push:
    paths:
      - "frontend/src/**"
  workflow_dispatch:

jobs:
  deploy_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/

      - name: Build app
        run: npm run build
        working-directory: frontend/
        env:
          CI: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::000363030077:role/s3-github-role
          aws-region: us-east-1

      - name: Fetch config from SSM
        run: |
          echo "CF_DIST_ID=$(aws ssm get-parameter --name cf-arn --query Parameter.Value --output text)" >> $GITHUB_ENV

      - name: Sync to S3 bucket
        run: aws s3 sync frontend/build s3://banksie.app/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_DIST_ID \
            --paths "/*"

  notify_failure:
    needs: [deploy_frontend]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Notify Slack if pipeline fails
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.CHANNEL_ID }}
            text: "🚨 *Upload to S3 Failed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nWorkflow: ${{ github.workflow }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
